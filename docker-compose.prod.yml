name: szrouter-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4-alpine
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 30

  gateway:
    build: { context: ., dockerfile: gateway/Dockerfile }
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
    volumes: ["uploads:/data/uploads", "exports:/data/exports"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  worker:
    build: { context: ., dockerfile: worker/Dockerfile }
    restart: always
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      UPLOAD_DIR: /data/uploads
      EXPORT_DIR: /data/exports
    volumes: ["uploads:/data/uploads", "exports:/data/exports"]
    depends_on:
      gateway: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_BASE_URL: https://${DOMAIN}
    restart: always
    depends_on: [gateway]

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.${DOMAIN}
    restart: always
    depends_on: [gateway]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    environment:
      DOMAIN: ${DOMAIN}
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on: [web, admin, gateway]

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  uploads:
  exports:
  certbot_www:
  letsencrypt:
